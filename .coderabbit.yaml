language: en-US
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: false
  high_level_summary_placeholder: ""
  auto_title_placeholder: ""
  review_status: true
  poem: false
  collapse_walkthrough: true
  path_instructions:
    - path: "controllers/**"
      instructions: |
        Focus on error handling, concurrency safety, and phase transition correctness.
        Verify that package-level slices in backup.go are not mutated directly.
        Check that new functions stay under 60 lines (funlen linter limit).
        Ensure structured logging is used (log.FromContext(ctx).Info/Error).
        For restore logic, verify only one active Restore is assumed.
    - path: "api/v1beta1/**"
      instructions: |
        Focus on API compatibility and backward compatibility.
        Verify that new fields have appropriate json tags and omitempty where needed.
        Check that webhook validation rules are consistent with controller behavior.
        Ensure deepcopy generation is triggered for type changes.
    - path: "pkg/tlsconfig/**"
      instructions: |
        Verify TLS configuration aligns with OpenShift TLS security profiles.
        Ensure HTTP/2 disable logic is applied after profile config.
        Check that no hardcoded TLS versions or cipher suites are introduced.
    - path: "main.go"
      instructions: |
        Verify startup sequence correctness (CRD gate, TLS fetch, manager setup).
        Ensure fail-fast on critical errors (TLS fetch, client creation).
        Check that new flags or configuration follow existing patterns.
  path_filters:
    - "!**/*_test.go"
    - "!**/zz_generated.deepcopy.go"
    - "!hack/crds/**"
    - "!config/crd/bases/**"
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - "release-*"
    ignore_title_keywords:
      - WIP
      - DO NOT MERGE
      - DRAFT
chat:
  auto_reply: true
